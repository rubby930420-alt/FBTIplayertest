<style>
body {
    font-family: sans-serif;
    background: linear-gradient(135deg, #E0ECDE, #CDE0C9);
    padding: 20px;
}

/* 卡片 */
.container {
    max-width: 650px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(44, 105, 117, 0.15);
}

/* 进度 */
#progress {
    margin-bottom: 15px;
    color: #2C6975;
    font-weight: bold;
}

/* 题目 */
#question {
    color: #2C6975;
    margin-bottom: 20px;
}

/* 选项卡 */
.option {
    padding: 14px 18px;
    margin: 12px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: #F7FAF8;
    border: 1px solid #CDE0C9;
    color: #2C6975;
}

/* 悬停 */
.option:hover {
    background: #E0ECDE;
    transform: translateY(-2px);
}

/* 选中（重点🔥） */
.option.selected {
    background: linear-gradient(135deg, #2C6975, #68B2A0);
    color: white;
    border: none;
    box-shadow: 0 6px 15px rgba(44, 105, 117, 0.3);
}

/* 按钮 */
button {
    margin-top: 25px;
    padding: 12px 26px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 16px;

    background: linear-gradient(135deg, #2C6975, #68B2A0);
    color: white;

    transition: all 0.25s ease;
}

/* 按钮悬停 */
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(44, 105, 117, 0.3);
}

button:disabled {
    background: #ccc;
    cursor: not-allowed;
}
</style>

</head>

let answers = [];
let current = 0;
let selectedOption = null;
;


function showQuestion() {

    const q = questions[current];

    // 显示题目
    document.getElementById("question").innerText = q.text;

    // 获取选项容器
    const optionsDiv = document.getElementById("options");

    // ❗每次先清空（非常重要）
    optionsDiv.innerHTML = "";

    // 👇👇👇 就放在这里 👇👇👇
    q.options.forEach(option => {
        const div = document.createElement("div");

        div.className = "option";
        div.innerText = option.text;

        div.onclick = () => {

            document.querySelectorAll(".option").forEach(el => {
                el.classList.remove("selected");
            });

            div.classList.add("selected");

            selectedOption = option;
        };

        optionsDiv.appendChild(div);
    });

}

// =======================
// 计分 + 人格判定核心逻辑
// =======================

function calculateResult() {

    let score = {
        I: 0, S: 0, A: 0, C: 0,
        E: 0, G: 0, T: 0, P: 0
    };

    const map = {
        Individual: "I",
        Systematic: "S",
        Aggressive: "A",
        Conservative: "C",
        Emotional: "E",
        Gentle: "G",
        Tech: "T",
        Power: "P"
    };

    answers.forEach(ans => {
        if (!ans || !ans.score) return;

        for (let key in ans.score) {
            const mappedKey = map[key];
            if (mappedKey) {
                score[mappedKey] += ans.score[key];
            }
        }
    });

    let type =
        (score.I >= score.S ? "I" : "S") +
        (score.A >= score.C ? "A" : "C") +
        (score.E >= score.G ? "E" : "G") +
        (score.T >= score.P ? "T" : "P");

    let totalDiff =
        Math.abs(score.I - score.S) +
        Math.abs(score.A - score.C) +
        Math.abs(score.E - score.G) +
        Math.abs(score.T - score.P);

    let level = totalDiff >= 10 ? "strong" : "weak";

    return { type, level, score };
}

// ③ 下一题按钮
document.getElementById("nextBtn").onclick = function () {

    if (!selectedOption) {
        alert("请选择一个选项！");
        return;
    }

    // 保存答案
    answers.push({
        score: selectedOption.scores
    });

    selectedOption = null;

    current++;

    if (current < questions.length) {
        showQuestion();
    } else {

        document.querySelector(".container").style.display = "none";
        document.getElementById("loading").style.display = "block";

        const result = calculateResult();

        localStorage.setItem("result", JSON.stringify(result));

        setTimeout(() => {
            window.location.href = "result.html.html";
        }, 2000);
    }
};


// ❗④ 最关键：启动
showQuestion();
